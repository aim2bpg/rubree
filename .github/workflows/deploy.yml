name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest

    if: ${{github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read tool versions
        id: versions
        # .rust-version: Ref https://github.com/kateinoigakukun/wasi-vfs/blob/main/rust-toolchain.toml
        # .wasi-vfs-version: Ref https://github.com/kateinoigakukun/wasi-vfs/releases
        run: |
          echo "rust=$(cat .rust-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          echo "wasi-vfs=$(cat .wasi-vfs-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.versions.outputs.rust }}

      - name: Install wasi-vfs
        run: |
          WASI_VFS_VERSION="${{ steps.versions.outputs.wasi-vfs }}"
          curl -LO "https://github.com/kateinoigakukun/wasi-vfs/releases/download/v${WASI_VFS_VERSION}/wasi-vfs-cli-x86_64-unknown-linux-gnu.zip"
          unzip wasi-vfs-cli-x86_64-unknown-linux-gnu.zip
          sudo mv wasi-vfs /usr/local/bin/wasi-vfs

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ./.node-version
          cache: yarn
          cache-dependency-path: ./pwa/yarn.lock

      - name: Extract Yarn version
        id: yarn-version
        run: echo "version=$(jq -r '.packageManager' pwa/package.json | cut -d'@' -f2)" >> "$GITHUB_OUTPUT"

      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare "yarn@${{ steps.yarn-version.outputs.version }}" --activate

      # Two-tier cache keys, scoped to what actually feeds the WASM build. Hashing the
      # whole Gemfile.lock here would invalidate both caches on every Dependabot bump,
      # even for gems outside the :wasm group that never reach the build (12+ min of
      # wasted cross-compilation). The fingerprints come from the same Bundler
      # definition wasmify:build uses (BUNDLE_ONLY=wasm), so they rotate exactly when
      # the build inputs change:
      #
      #   exts — native-extension gems compiled into rubies/*.tar.gz. The tarball
      #          filename embeds an MD5 of these full_names, so a stale "exts" key
      #          would cause the name-mismatch rebuild + "cache hit, not saving" loop
      #          documented in PR #635/#636.
      #   all  — every :wasm-group gem (embedded into ruby.wasm as /bundle). A pure-Ruby
      #          gem bump rotates only this key: the module is rebuilt, but the compiled
      #          tarball is reused, skipping the slow cross-compile.
      #
      # The module key's inputs are a superset of the artefact key's, so "module hit
      # but artefacts stale" cannot happen.
      - name: Compute WASM build fingerprints
        id: wasm-fingerprint
        run: BUNDLE_ONLY=wasm bundle exec ruby script/wasm_build_fingerprint.rb >> "$GITHUB_OUTPUT"

      - name: Cache Ruby Wasm Artefacts
        id: cache-ruby-wasm
        uses: actions/cache@v6
        with:
          path: |
            build
            rubies
          key: ${{ runner.os }}-v2-${{ hashFiles('.ruby-version', 'config/wasmify.yml', 'ruby_wasm_patches/**', 'lib/tasks/wasmify_patches.rake') }}-${{ steps.wasm-fingerprint.outputs.exts }}-ruby-wasm

      - name: Cache Compiled ruby.wasm Module
        id: cache-ruby-wasm-module
        uses: actions/cache@v6
        with:
          path: tmp/wasmify/ruby.wasm
          key: ${{ runner.os }}-v2-${{ hashFiles('.ruby-version', 'config/wasmify.yml', 'ruby_wasm_patches/**', 'lib/tasks/wasmify_patches.rake') }}-${{ steps.wasm-fingerprint.outputs.all }}-ruby-wasm-module

      - name: Build ruby.wasm (if needed)
        if: steps.cache-ruby-wasm-module.outputs.cache-hit != 'true'
        run: bin/rails wasmify:build

      - name: Pack app.wasm
        run: bin/rails wasmify:pack

      - name: Cache node_modules (PWA)
        id: pwa-node-modules-cache
        uses: actions/cache@v6
        with:
          path: pwa/node_modules
          key: ${{ runner.os }}-pwa-node_modules-${{ hashFiles('pwa/yarn.lock') }}

      - name: Build PWA
        working-directory: pwa
        run: |
          if [ "${{ steps.pwa-node-modules-cache.outputs.cache-hit }}" != "true" ]; then
            yarn install
          fi
          yarn build

      - name: Prepare static files (sitemap, robots, icons)
        run: |
          chmod +x ./script/prepare_static_files.sh
          ./script/prepare_static_files.sh

      - name: Add .nojekyll to prevent GitHub Pages Jekyll build
        run: echo "" > ./pwa/dist/.nojekyll

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './pwa/dist'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
